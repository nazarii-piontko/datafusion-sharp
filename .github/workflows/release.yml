name: Release

on:
  push:
    tags: ['v*.*.*']

env:
  CARGO_TERM_COLOR: always
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  check:
    name: Run Checks
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  pack-build-native:
    name: Build Native
    needs: check
    strategy:
      matrix:
        include:
          # Linux x64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
          
          # Linux ARM64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm

          # Windows x64
          - target: x86_64-pc-windows-msvc
            os: windows-2025
          
          # macOS ARM64
          - target: aarch64-apple-darwin
            os: macos-26
    
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          targets: ${{ matrix.target }}
          toolchain: 'stable'

      - name: Setup Protoc
        uses: arduino/setup-protoc@v3

      - name: Build Native Library
        working-directory: native
        run: cargo build --target ${{ matrix.target }} --profile release --lib

      - name: (Linux) Prepare Native Library Artifacts
        if: runner.os == 'Linux'
        run: |
          mkdir -p artifacts/native/target/${{ matrix.target }}/release/
          cp native/target/${{ matrix.target }}/release/*.so artifacts/native/target/${{ matrix.target }}/release/

      - name: (Windows) Prepare Native Library Artifacts
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/native/target/${{ matrix.target }}/release/
          Copy-Item native/target/${{ matrix.target }}/release/*.dll artifacts/native/target/${{ matrix.target }}/release/
          
      - name: (MacOS) Prepare Native Library Artifacts
        if: runner.os == 'MacOS'
        run: |
          mkdir -p artifacts/native/target/${{ matrix.target }}/release/
          cp native/target/${{ matrix.target }}/release/*.dylib artifacts/native/target/${{ matrix.target }}/release/

      - name: Upload Native Library as Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: native-${{ matrix.target }}
          path: artifacts/**
          overwrite: true
          retention-days: 1

  pack:
    name: Pack NuGet
    needs: pack-build-native
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Download Artifacts
        uses: actions/download-artifact@v7
        with:
          path: ./
          merge-multiple: true
        
      - name: Pack DataFusionSharp NuGet Package
        run: dotnet pack src/DataFusionSharp/DataFusionSharp.csproj -c Release -p:BuildNativeLib=false -o ./packages

      - name: Pack DataFusionSharp.Data NuGet Package
        run: dotnet pack src/DataFusionSharp.Data/DataFusionSharp.Data.csproj -c Release -p:BuildNativeLib=false -o ./packages

      - name: Upload NuGet Package
        uses: actions/upload-artifact@v6
        with:
          name: nuget-package
          path: packages/*
          retention-days: 7

  pack-smoke-test:
    name: Pack Test
    needs: pack
    strategy:
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm, windows-2025, macos-26]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Download NuGet Package Artifacts
        uses: actions/download-artifact@v7
        with:
          name: nuget-package
          path: packages

      - name: Build Test Application with Local NuGet Package
        working-directory: tests/DataFusionSharp.PackageSmokeTest
        run: dotnet build -c Release -p:UseLocalPackage=true
      
      - name: Run Test Application
        working-directory: tests/DataFusionSharp.PackageSmokeTest
        run: dotnet run --no-build -c Release -p:UseLocalPackage=true
        timeout-minutes: 1

  pack-publish-github:
    name: Publish to GitHub Packages
    needs: pack-smoke-test
    runs-on: ubuntu-24.04
    permissions:
      packages: write
    steps:
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Download NuGet Package Artifacts
        uses: actions/download-artifact@v7
        with:
          name: nuget-package
          path: packages

      - name: Extract Version
        id: version
        shell: bash
        run: |
          # Find the package files
          DFS_NUPKG=$(ls packages/DataFusionSharp.*.nupkg | head -n 1)
          DFS_SNUPKG=$(ls packages/DataFusionSharp.*.snupkg | head -n 1)
          DFSD_NUPKG=$(ls packages/DataFusionSharp.Data.*.nupkg | head -n 1)
          DFSD_SNUPKG=$(ls packages/DataFusionSharp.Data.*.snupkg | head -n 1)

          if [ -z "$DFS_NUPKG" ]; then
            echo "❌ No DataFusionSharp nupkg found"
            exit 1
          fi

          if [ -z "$DFS_SNUPKG" ]; then
            echo "❌ No DataFusionSharp snupkg found"
            exit 1
          fi

          if [ -z "$DFSD_NUPKG" ]; then
            echo "❌ No DataFusionSharp.Data nupkg found"
            exit 1
          fi

          if [ -z "$DFSD_SNUPKG" ]; then
            echo "❌ No DataFusionSharp.Data snupkg found"
            exit 1
          fi

          # Extract version from filename
          # DataFusionSharp.0.1.0.nupkg -> 0.1.0
          VERSION=$(basename "$DFS_NUPKG" | sed -E 's/DataFusionSharp\.(.*)\.nupkg/\1/')

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "dfs_nupkg=$DFS_NUPKG" >> $GITHUB_OUTPUT
          echo "dfs_snupkg=$DFS_SNUPKG" >> $GITHUB_OUTPUT
          echo "dfsd_nupkg=$DFSD_NUPKG" >> $GITHUB_OUTPUT
          echo "dfsd_snupkg=$DFSD_SNUPKG" >> $GITHUB_OUTPUT

          echo "📦 DataFusionSharp Package: $DFS_NUPKG"
          echo "📦 DataFusionSharp Symbol Package: $DFS_SNUPKG"
          echo "📦 DataFusionSharp.Data Package: $DFSD_NUPKG"
          echo "📦 DataFusionSharp.Data Symbol Package: $DFSD_SNUPKG"
          echo "📌 Version: $VERSION"

      - name: Publish to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dotnet nuget push \
            ${{ steps.version.outputs.dfs_nupkg }} \
            --api-key "$GITHUB_TOKEN" \
            --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json

          dotnet nuget push \
            ${{ steps.version.outputs.dfs_snupkg }} \
            --api-key "$GITHUB_TOKEN" \
            --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json

          dotnet nuget push \
            ${{ steps.version.outputs.dfsd_nupkg }} \
            --api-key "$GITHUB_TOKEN" \
            --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json

          dotnet nuget push \
            ${{ steps.version.outputs.dfsd_snupkg }} \
            --api-key "$GITHUB_TOKEN" \
            --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
