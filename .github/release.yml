changelog:
  categories:
    - title: 🚀 Features
      labels:
        - enhancement
        - feature
    - title: 🐛 Bug Fixes
      labels:
        - bug
        - fix
    - title: 📖 Documentation
      labels:
        - documentation
    - title: 🧰 Maintenance
      labels:
        - chore
        - maintenance
        - dependencies
    - title: 💥 Breaking Changes
      labels:
        - breaking-change
    - title: Other Changes
      labels:
        - '*'
  exclude:
    labels:
      - ci-skip

