syntax = "proto3";

package datafusion_sharp_proto;

option csharp_namespace = "DataFusionSharp.Proto";

// Options for configuring an S3 object store.
message S3ObjectStoreOptions {
  // S3 bucket name (required)
  string bucket_name = 1;
  // AWS region
  optional string region = 2;
  // AWS access key ID
  optional string access_key_id = 3;
  // AWS secret access key
  optional string secret_access_key = 4;
  // Custom endpoint URL (for S3-compatible services like `MinIO`)
  optional string endpoint = 5;
  // Session token for temporary credentials
  optional string token = 6;
  // Allow HTTP (non-TLS) connections. Default false.
  optional bool allow_http = 7;
  // Use virtual hosted style requests. Default false.
  optional bool virtual_hosted_style_request = 8;
  // Skip signing requests (for anonymous access to public buckets). Default false.
  optional bool skip_signature = 9;
}

// Options for configuring an Azure Blob Storage object store.
message AzureBlobStorageOptions {
  // Azure container name (required)
  string container_name = 1;
  // Azure storage account name
  optional string account_name = 2;
  // Azure storage access key
  optional string access_key = 3;
  // Bearer token for authentication
  optional string bearer_token = 4;
  // Client ID for service principal authentication
  optional string client_id = 5;
  // Client secret for service principal authentication
  optional string client_secret = 6;
  // Tenant ID for service principal authentication
  optional string tenant_id = 7;
  // Shared Access Signature key
  optional string sas_key = 8;
  // Custom endpoint URL
  optional string endpoint = 9;
  // Use Azurite emulator. Default false.
  optional bool use_emulator = 10;
  // Allow HTTP (non-TLS) connections. Default false.
  optional bool allow_http = 11;
  // Skip signing requests (for anonymous access). Default false.
  optional bool skip_signature = 12;
}

// Options for configuring a Google Cloud Storage object store.
message GoogleCloudStorageOptions {
  // GCS bucket name (required)
  string bucket_name = 1;
  // GCP project ID
  optional string project_id = 2;
  // Path to a service account JSON key file
  optional string credentials_path = 3;
  // Service account JSON key as a string
  optional string credentials = 4;
  // Service account email
  optional string service_account_email = 5;
  // Custom endpoint URL
  optional string custom_endpoint = 6;
  // Allow HTTP (non-TLS) connections. Default false.
  optional bool allow_http = 7;
  // Skip signing requests (for anonymous access). Default false.
  optional bool skip_signature = 8;
}
